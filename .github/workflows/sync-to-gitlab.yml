# Trimite automat main de pe GitHub către GitLab (după ce adaugi secretele în repo).
# GitHub → Settings → Secrets and variables → Actions → New repository secret:
#   GITLAB_TOKEN = token GitLab (scope: write_repository, api)
#   GITLAB_PROJECT = Hercules-metusalem969/dashboard

name: Sync to GitLab

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ secrets.GITLAB_TOKEN != '' && secrets.GITLAB_PROJECT != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_PROJECT: ${{ secrets.GITLAB_PROJECT }}
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@gitlab.com/${GITLAB_PROJECT}.git" || true
          git push gitlab HEAD:main --force
